name: 打包 Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-docx pyinstaller

      - name: 打包 EXE
        run: |
          pyinstaller --onefile --windowed --name "批量文书生成工具" run_gui.py

      - name: 整理发布包
        shell: bash
        run: |
          mkdir -p release_pkg
          cp "dist/批量文书生成工具.exe" "release_pkg/批量文书生成工具.exe"
          cp "使用说明.txt" "release_pkg/使用说明.txt"
          cp "模板制作说明.txt" "release_pkg/模板制作说明.txt"
          cp "名单示例.txt" "release_pkg/名单示例.txt"
          cd release_pkg
          7z a "../批量文书生成工具_完整包.zip" .

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "批量文书生成工具 v1.0.${{ github.run_number }}"
          body: |
            ## 下载说明
            下载 **批量文书生成工具_完整包.zip**，解压后包含：
            - `批量文书生成工具.exe` — 双击直接运行
            - `使用说明.txt` — 完整操作步骤
            - `模板制作说明.txt` — Word模板怎么做
            - `名单示例.txt` — 名单格式示例

            **无需安装Python，双击即用。**
          files: 批量文书生成工具_完整包.zip
