name: 打包 Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-docx pyinstaller

      - name: 打包 EXE
        run: |
          pyinstaller --onefile --windowed --name "批量文书生成工具v1" run_gui.py

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 批量文书生成工具v1-Windows
          path: dist/批量文书生成工具v1.exe

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "批量文书生成工具 v1.0.${{ github.run_number }}"
          body: |
            双击 exe 直接运行，无需安装 Python 或任何依赖。
          files: dist/批量文书生成工具v1.exe
